<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神的恩典够我们用</title>

    <style>
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
        }

        header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        nav {
            background-color: #34495e;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 16px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 20px;
        }

        .section {
            background: white;
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        h2 {
            color: #2c3e50;
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            background-color: #2c3e50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #1a242f;
        }

        .comments {
            margin-top: 15px;
        }

        .comment {
            background: #ecf0f1;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<header>
    神的恩典够我们用
</header>

<nav>
    <a href="#personal">个人生命</a>
    <a href="#gospel">活泉布道</a>
    <a href="#discussion">交流讨论</a>
</nav>

<div class="container">

    <!-- 第一部分 -->
    <div class="section" id="personal">
        <h2>个人与神的关系</h2>
        <p>
            这里记录我与神同行的生命历程，包括灵修笔记、祷告心得、生命更新的见证等。
        </p>
        <ul>
            <li>📖 灵修分享</li>
            <li>🙏 祷告记录</li>
            <li>🌱 生命成长见证</li>
        </ul>
    </div>

    <!-- 第二部分 -->
    <div class="section" id="gospel">
        <h2>活泉小组布道</h2>
        <p>
            分享活泉小组的布道资源，包括讲章、视频、图片及见证。
        </p>

        <ul>
            <li>🎤 讲章信息（可上传PDF或文字）</li>
            <li>🎬 视频分享（YouTube或本地视频）</li>
            <li>🖼 图片记录（活动照片）</li>
            <li>✨ 生命见证</li>
        </ul>
    </div>

    <!-- 第三部分 -->
    <div class="section" id="discussion">
        <h2>讨论与交流</h2>
        <p>欢迎留言，一起交流、分享与建造。</p>

        <textarea id="commentInput" placeholder="请输入你的留言..."></textarea>
        <br>
        <button onclick="addComment()">提交留言</button>

        <div class="comments" id="commentsSection"></div>
    </div>

</div>

<script>
    function addComment() {
        const input = document.getElementById("commentInput");
        const text = input.value.trim();

        if (text === "") {
            alert("留言不能为空！");
            return;
        }

        const commentDiv = document.createElement("div");
        commentDiv.className = "comment";
        commentDiv.innerText = text;

        document.getElementById("commentsSection").appendChild(commentDiv);

        input.value = "";
    }
</script>

</body>
</html>
